<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffeef2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 350px;
            transition: all 0.5s ease;
        }

        h2 { color: #ff4a70; margin-bottom: 20px; }
        
        input[type="date"] {
            padding: 10px;
            border: 2px solid #ffb3c1;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            width: 80%;
            margin-bottom: 20px;
        }

        button {
            background-color: #ff4a70;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #e0385f; }

        .error-msg { color: #d9381e; font-size: 14px; margin-top: 10px; display: none; }

        /* Pantalla de las Flores */
        #flower-stage { display: none; }

        /* Contenedor interactivo */
        .flower-box {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px auto;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animación básica del capullo inicial */
        .bud-stage {
            position: absolute;
            width: 100px;
            height: 150px;
            transition: all 0.5s ease;
        }

        .stem {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 6px;
            height: 90px;
            background-color: #4caf50;
            transform: translateX(-50%);
            border-radius: 3px;
        }

        .bud {
            position: absolute;
            top: 25px;
            left: 50%;
            width: 40px;
            height: 40px;
            background-color: #8cbb8e;
            border-radius: 50% 50% 0 0;
            transform: translateX(-50%);
        }

        /* Imagen de tu Gatito con la Rosa (Oculta al principio) */
        .cat-flower-img {
            width: 180px;
            height: 180px;
            opacity: 0;
            transform: scale(0.3);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        /* CUANDO SE PRESIONA: Oculta el capullo y muestra el gatito */
        .flower-box.bloom .bud-stage {
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
        }

        .flower-box.bloom .cat-flower-img {
            opacity: 1;
            transform: scale(1);
        }

        #message {
            font-size: 24px;
            font-weight: bold;
            color: #ff0033;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.8s ease 0.5s; /* Aparece justo después del gatito */
        }

        .flower-box.bloom + #message {
            opacity: 1;
            transform: scale(1);
        }
        
        .hint { font-size: 12px; color: #aaa; margin-top: 5px;}
    </style>
</head>
<body>

    <div id="auth-stage" class="container">
        <h2>¿Cuándo es tu cumple? ¡Introduce la fecha!</h2>
        <input type="date" id="birthdate">
        <br>
        <button onclick="checkDate()">Ingresar</button>
        <p id="error" class="error-msg">¡Upps! Esa no es la fecha correcta. Inténtalo de nuevo. ❤️</p>
    </div>

    <div id="flower-stage" class="container">
        <h2 id="instruction">¡Toca el capullo para que florezca!</h2>
        
        <div class="flower-box" onclick="bloomFlower(this)">
            <!-- Capullo que se desvanece -->
            <div class="bud-stage">
                <div class="stem"></div>
                <div class="bud"></div>
            </div>

            <!-- Tu Gatito con la Rosa dibujado en vectores -->
            <svg class="cat-flower-img" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <!-- Tallo de la rosa -->
                <path d="M72,160 Q85,120 120,75" fill="none" stroke="#437036" stroke-width="7" stroke-linecap="round"/>
                <!-- Hojas del tallo -->
                <path d="M102,105 Q125,115 133,103 Q115,95 102,105" fill="#528743" stroke="#2c4c22" stroke-width="2"/>
                <path d="M85,125 Q62,135 60,120 Q80,115 85,125" fill="#528743" stroke="#2c4c22" stroke-width="2"/>
                
                <!-- Gatito Cuerpo -->
                <path d="M45,130 C35,110 32,78 52,78 C62,78 68,90 72,95 C78,90 84,78 94,78 C114,78 110,110 101,130 C95,145 98,162 90,166 C72,172 65,172 52,166 C46,162 48,145 45,130 Z" fill="#ffffff" stroke="#1a1a1a" stroke-width="6" stroke-linejoin="round"/>
                <!-- Orejas -->
                <path d="M38,95 C36,88 42,84 46,88 Z" fill="#fbc3cd"/>
                <path d="M105,95 C107,88 101,84 97,88 Z" fill="#fbc3cd"/>
                <!-- Ojos -->
                <circle cx="56" cy="112" r="3.5" fill="#1a1a1a"/>
                <circle cx="82" cy="112" r="3.5" fill="#1a1a1a"/>
                <!-- Sonrojo -->
                <ellipse cx="48" cy="119" rx="6" ry="4" fill="#fbc3cd" opacity="0.7"/>
                <ellipse cx="90" cy="119" rx="6" ry="4" fill="#fbc3cd" opacity="0.7"/>
                <!-- Manitas -->
                <path d="M54,136 Q64,142 66,134" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
                <path d="M86,136 Q76,142 74,134" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>

                <!-- Rosa Roja -->
                <g id="rose-petals">
                    <path d="M105,75 Q122,85 135,70 Q118,62 105,75" fill="#528743" stroke="#2c4c22" stroke-width="2"/>
                    <path d="M100,50 C90,20 155,10 155,45 C155,75 110,85 105,70 C100,60 95,55 100,50 Z" fill="#d33636" stroke="#661011" stroke-width="4.5" stroke-linejoin="round"/>
                    <path d="M115,40 C110,15 165,25 150,55 C140,68 120,65 115,40 Z" fill="#e64c4c" stroke="#661011" stroke-width="3"/>
                    <path d="M125,48 C120,30 150,32 142,52 C135,58 128,55 125,48 Z" fill="#f06767" stroke="#661011" stroke-width="2.5"/>
                    <path d="M130,46 A 6 6 0 1 1 138,42" fill="none" stroke="#661011" stroke-width="3" stroke-linecap="round"/>
                </g>
            </svg>
        </div>

        <div id="message">feliz cumpleaños <3</div>
    </div>

    <script>
        function checkDate() {
            const inputDate = document.getElementById('birthdate').value;
            if (!inputDate) return;

            // Extraemos mes y día (YYYY-MM-DD)
            const parts = inputDate.split('-');
            const month = parts[1];
            const day = parts[2];

            // Validamos que sea el 10 de Junio (10-06)
            if (day === '10' && month === '06') {
                document.getElementById('auth-stage').style.display = 'none';
                document.getElementById('flower-stage').style.display = 'block';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }

        function bloomFlower(element) {
            element.classList.add('bloom');
            document.getElementById('instruction').style.opacity = '0';
        }
    </script>
</body>
</html>
